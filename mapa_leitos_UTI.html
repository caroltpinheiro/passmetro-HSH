/* ===== WEBAPP STYLES ===== */
*, *::before, *::after { box-sizing: border-box; }

body { margin: 0; padding: 0; background: #f0f4f8; }

#app-nav {
  position: sticky; top: 0; z-index: 200;
  background: #1b3a52;
  padding: 6px 10px;
  display: flex; flex-wrap: wrap; gap: 4px; align-items: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}

.nav-title {
  color: white; font-size: 11px; font-weight: bold;
  font-family: Calibri, sans-serif; white-space: nowrap; margin-right: 6px;
}
.home-btn {
  font-size: 7.5pt; font-weight: bold; color: #a8d8f0; text-decoration: none;
  padding: 3px 8px; border: 1px solid #4a7a9b; border-radius: 3px;
  background: #152e45; white-space: nowrap; margin-right: 6px;
  transition: background 0.15s, color 0.15s;
}
.home-btn:hover { background: #729fcf; color: #fff; }

.nav-group { display: flex; gap: 2px; align-items: center; }

.nav-sep {
  width: 1px; height: 22px; background: #4a6a82; margin: 0 4px;
}

.bed-btn {
  background: #2e4d6e; color: white; border: none;
  padding: 3px 7px; cursor: pointer; font-size: 10px;
  border-radius: 3px; font-family: Calibri, sans-serif;
  transition: background 0.15s;
}
.bed-btn:hover { background: #3d6b96; }
.bed-btn.active { background: #e74c3c; font-weight: bold; }
.bed-btn.has-data { background: #1a6b8a; }
.bed-btn.active.has-data { background: #e74c3c; }

.nav-global {
  display: flex; align-items: center; gap: 8px;
  margin-left: auto; flex-wrap: wrap;
}

.nav-label {
  color: #aac4d8; font-size: 10px; font-family: Calibri, sans-serif;
}

.nav-input {
  background: #2e4d6e; border: 1px solid #4a6a82; color: white;
  padding: 2px 6px; border-radius: 3px; font-size: 10px;
  font-family: Calibri, sans-serif; outline: none;
}
.nav-input:focus { border-color: #1a6b8a; }

.nav-checkbox-label {
  color: white; font-size: 10px; font-family: Calibri, sans-serif;
  display: flex; align-items: center; gap: 3px; cursor: pointer;
}

#btn-print {
  background: #1a6b8a; color: white; border: none;
  padding: 4px 10px; border-radius: 3px; cursor: pointer;
  font-size: 10px; font-family: Calibri, sans-serif;
}
#btn-print:hover { background: #1d7da3; }

#save-indicator {
  padding: 3px 10px; border-radius: 3px;
  font-size: 10px; font-family: Calibri, sans-serif;
  color: white; background: #27ae60; white-space: nowrap;
  transition: background 0.3s;
}

#app-form-wrapper {
  padding: 16px; display: flex; justify-content: center;
}

#app-form {
  background: white;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  border-radius: 4px;
  overflow: visible;
}

/* Form field styles */
.fi {
  border: none; background: transparent;
  font-family: Calibri, sans-serif; font-size: 6pt; color: #222222;
  width: 100%; padding: 0; margin: 0; outline: none;
  min-width: 10px;
}
.fi:hover { background: rgba(26,107,138,0.07); }
.fi:focus { background: rgba(255,255,150,0.5); outline: 1px solid #1a6b8a; border-radius: 1px; }

.fi-inline {
  border: none; background: transparent;
  font-family: Calibri, sans-serif; font-size: 6pt; color: #222222;
  padding: 0; margin: 0; outline: none;
  border-bottom: 1px solid rgba(0,0,0,0.2);
}
.fi-inline:focus { background: rgba(255,255,150,0.5); outline: none; }

.fi-white {
  color: white; border-bottom: 1px solid rgba(255,255,255,0.4);
}
.fi-white:focus { background: rgba(255,255,255,0.15); }

.fe {
  outline: none; min-height: 14px; width: 100%;
  font-family: Calibri, sans-serif; font-size: 6pt; color: #222222;
  word-break: break-word;
}
.fe:hover { background: rgba(26,107,138,0.05); }

// ── Event Listeners ──────────────────────────────────────────────
function attachListeners() {
  const form = document.getElementById('app-form');
  form.querySelectorAll('input[type="text"][data-f], input[type="date"][data-f]').forEach(el => {
    el.addEventListener('input', scheduleSave);
  });
  form.querySelectorAll('input[type="checkbox"][data-f]').forEach(el => {
    el.addEventListener('change', scheduleSave);
  });
  form.querySelectorAll('[contenteditable="true"][data-f]').forEach(el => {
    el.addEventListener('input', scheduleSave);
  });
}

// ── Save/Load ────────────────────────────────────────────────────
function scheduleSave() {
  if (isLoadingFromFirestore) return;
  setSaveState('saving');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveBed(currentBed), 600);
}

function saveBed(bed) {
  const form = document.getElementById('app-form');
  if (!form) return;
  const data = {};
  form.querySelectorAll('[data-f]').forEach(el => {
    const f = el.dataset.f;
    if (el.type === 'checkbox') data[f] = el.checked;
    else if (el.contentEditable === 'true') data[f] = el.innerHTML;
    else data[f] = el.value;
  });
  bedCache[bed] = data;
  db.collection(ENF_COL).doc('bed-' + bed).set(data)
    .then(() => { setSaveState('saved'); refreshBedBtn(bed, data); setTimeout(() => setSaveState('idle'), 2000); })
    .catch(() => { setSaveState('error'); setTimeout(() => setSaveState('idle'), 3000); });
}

function loadBed(bed) {
  const data = bedCache[bed];
  if (!data) return;
  const form = document.getElementById('app-form');
  form.querySelectorAll('[data-f]').forEach(el => {
    const f = el.dataset.f;
    if (!(f in data)) return;
    if (el.type === 'checkbox') el.checked = !!data[f];
    else if (el.contentEditable === 'true') el.innerHTML = data[f] || '';
    else el.value = data[f] || '';
  });
}

function saveGlobal() {
  clearTimeout(globalSaveTimer);
  globalSaveTimer = setTimeout(() => {
    GLOB_REF.set({
      enf:    document.getElementById('g-enf').value,
      data:   document.getElementById('g-data').value,
      diurno:  document.getElementById('g-diurno').checked,
      noturno: document.getElementById('g-noturno').checked,
    }).catch(err => console.error('Erro global:', err));
    updateHdr();
  }, 800);
}

function loadGlobal() {
  GLOB_REF.onSnapshot(doc => {
    if (doc.exists) {
      const d = doc.data();
      if (d.enf    != null) document.getElementById('g-enf').value = d.enf;
      if (d.data   != null) document.getElementById('g-data').value = d.data;
      if (d.diurno  != null) document.getElementById('g-diurno').checked = d.diurno;
      if (d.noturno != null) document.getElementById('g-noturno').checked = d.noturno;
      updateHdr();
    }
  });
}

function updateHdr() {
  const enfEl = document.getElementById('hdr-enf');
  const dataEl = document.getElementById('hdr-data');
  const plantEl = document.getElementById('hdr-plantao');
  if (!enfEl) return;
  enfEl.textContent = document.getElementById('g-enf').value || '';
  const dv = document.getElementById('g-data').value;
  if (dv) { const [y,m,d] = dv.split('-'); dataEl.textContent = d+'/'+m+'/'+y; }
  else dataEl.textContent = '';
  const parts = [];
  if (document.getElementById('g-diurno').checked) parts.push('Diurno');
  if (document.getElementById('g-noturno').checked) parts.push('Noturno');
  plantEl.textContent = parts.length ? parts.join(' / ') : '[ ] Diurno  [ ] Noturno';
}

function setSaveState(s) {
  const el = document.getElementById('save-indicator');
  if      (s === 'saving') { el.textContent = 'Salvando…'; el.style.background = '#e67e22'; }
  else if (s === 'saved')  { el.textContent = 'Salvo ✓';   el.style.background = '#27ae60'; }
  else if (s === 'error')  { el.textContent = 'Erro!';     el.style.background = '#c0392b'; }
  else                     { el.textContent = '—';         el.style.background = '#555'; }
}

function refreshBedBtn(bed, data) {
  const hasData = data && Object.values(data).some(v => v !== '' && v !== false && v !== '<br>');
  const btn = document.getElementById('bb-' + bed);
  if (!btn) return;
  if (bed === currentBed) { btn.className = 'bed-btn active' + (hasData ? ' has-data' : ''); }
  else { btn.className = 'bed-btn' + (hasData ? ' has-data' : ''); }
}

// ── Print ────────────────────────────────────────────────────────
function togglePrintMenu(e) {
  e.stopPropagation();
  const menu = document.getElementById('print-menu');
  menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
}
function closePrintMenu() {
  const menu = document.getElementById('print-menu');
  if (menu) menu.style.display = 'none';
}
document.addEventListener('click', closePrintMenu);

function printCurrentBed() {
  closePrintMenu();
  saveBed(currentBed);
  updateHdr();
  window.print();
}

function printPosto(postoIdx) {
  closePrintMenu();
  saveBed(currentBed);

  const beds = BED_GROUPS[postoIdx];
  const printArea = document.getElementById('multi-print-area');
  printArea.innerHTML = '';

  // Global header values
  const enfVal  = document.getElementById('g-enf').value;
  const dataVal = document.getElementById('g-data').value;
  const diurno  = document.getElementById('g-diurno').checked;
  const noturno = document.getElementById('g-noturno').checked;
  let dataFmt = '';
  if (dataVal) { const [y,m,d] = dataVal.split('-'); dataFmt = d+'/'+m+'/'+y; }
  const plantaoTxt = [diurno?'Diurno':'', noturno?'Noturno':''].filter(Boolean).join(' / ')
    || '[ ] Diurno  [ ] Noturno';

  beds.forEach(bed => {
    const wrapper = document.createElement('div');
    wrapper.className = 'print-bed';
    wrapper.innerHTML = formHTML(bed);
    printArea.appendChild(wrapper);

    // Fill header displays
    const q = s => wrapper.querySelector(s);
    if (q('#hdr-enf'))     q('#hdr-enf').textContent    = enfVal;
    if (q('#hdr-data'))    q('#hdr-data').textContent   = dataFmt;
    if (q('#hdr-plantao')) q('#hdr-plantao').textContent = plantaoTxt;

    // Fill saved data
    const data = bedCache[bed];
    if (!data) return;
    wrapper.querySelectorAll('[data-f]').forEach(el => {
      const f = el.dataset.f;
      if (!(f in data)) return;
      if (el.type === 'checkbox') el.checked = !!data[f];
      else if (el.contentEditable === 'true') el.innerHTML = data[f] || '';
      else el.value = data[f] || '';
    });
  });

  document.body.classList.add('multi-print');
  window.print();

  window.addEventListener('afterprint', function cleanup() {
    document.body.classList.remove('multi-print');
    printArea.innerHTML = '';
    window.removeEventListener('afterprint', cleanup);
  }, {once: true});
}

// ── Init ─────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  initNav();
  loadGlobal();

  // Global field listeners
  ['g-enf','g-data'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => { saveGlobal(); updateHdr(); });
  });
  ['g-diurno','g-noturno'].forEach(id => {
    document.getElementById(id).addEventListener('change', () => { saveGlobal(); updateHdr(); });
  });

  // Escuta em tempo real todos os leitos
  setSaveState('saving');
  db.collection(ENF_COL).onSnapshot(snapshot => {
    isLoadingFromFirestore = true;
    snapshot.docChanges().forEach(change => {
      if (change.type === 'added' || change.type === 'modified') {
        const bed = parseInt(change.doc.id.replace('bed-', ''));
        if (ALL_BEDS.includes(bed)) {
          bedCache[bed] = change.doc.data();
          refreshBedBtn(bed, change.doc.data());
          // Se for o leito atual, atualiza o formulário visível
          if (bed === currentBed) loadBed(bed);
        }
      }
    });
    isLoadingFromFirestore = false;
    setSaveState('idle');
  }, () => setSaveState('error'));

  // Start on bed 301
  switchBed(301);
});
</script>
